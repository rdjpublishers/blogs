# ══════════════════════════════════════════════════════════════════
# pagefind.yml — Build & commit Pagefind search index automatically
# Triggered on every push to main branch.
# ══════════════════════════════════════════════════════════════════
name: Build Search Index

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-search-index:
    name: Build Pagefind index and commit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Pagefind search index
        run: npx pagefind --site . --output-subdir search

      - name: Commit updated search index
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update search index [skip ci]"
          file_pattern: search/
